- name: Set up the Azure VM with Docker and containers
  hosts: azure_vm
  become: true
  vars:
    docker_version: "20.10.7"
    keycloak_version: "latest"
    postgres_version: "latest"
    webserver_image: "nginx:latest"
    db_password: "keycloakpass"
    db_name: "keycloak"
    db_user: "keycloak"
    vm_user: "azureuser"

  tasks:
    - name: Install Docker
      include_role:
        name: setup_docker

    - name: Deploy PostgreSQL container
      include_role:
        name: deploy_postgres

    - name: Deploy Keycloak container
      include_role:
        name: deploy_keycloak

    - name: Deploy Web Server with Static Webpage
      include_role:
        name: deploy_webserver
