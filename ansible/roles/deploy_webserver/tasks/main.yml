- name: Create folder for static website
  file:
    path: /opt/site
    state: directory
    mode: '0755'

- name: Copy static webpage
  copy:
    src: site/index.html
    dest: /opt/site/index.html
    mode: '0644'

- name: Deploy Nginx web server for static page
  community.docker.docker_container:
    name: nginx-web
    image: nginx:latest
    state: started
    restart_policy: always
    published_ports:
      - "80:80"
    volumes:
      - /opt/site:/usr/share/nginx/html:ro
