
name: Deploy to Azure

'on':
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform   # <-- change to your folder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.Terraform_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Show files (debug)
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -name "*.tf"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
        env: TF_VAR_ssh_public_key: ${{ secrets.AZURE_RSA}}

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Terraform destroy
        run: terraform destroy -auto-approve 
      
        
