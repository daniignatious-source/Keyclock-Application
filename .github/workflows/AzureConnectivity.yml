name: Test Azure Connectivity

on:
  push:
    branches:
      - main

jobs:
  azure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.Terraform_SA }}

      - name: Test Azure Connectivity
        run: curl -I https://management.azure.com


        
