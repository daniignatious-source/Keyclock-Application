---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install required base packages
  apt:
    name:
      - curl
      - git
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Allow SSH
  ufw:
    rule: allow
    port: 22
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: 80
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
